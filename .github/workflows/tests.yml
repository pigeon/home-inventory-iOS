name: Tests

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode Version
        run: xcodebuild -version

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project HomeInventory.xcodeproj \
            -scheme HomeInventory \
            -destination 'platform=macOS' \
            -only-testing:HomeInventoryTests \
            CODE_SIGNING_ALLOWED=NO
